<!doctype html>
<!-- Placeholder registered in plan 02-01 so config.toml validates; plan 04 owns
     the full FISH-voice pass. Already uses the token-hash link (never
     {{ .ConfirmationURL }} — fragment tokens are unreadable server-side). -->
<html lang="en">
  <body>
    <p>Confirm your email to get started.</p>
    <p>
      <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
        >Confirm my email</a
      >
    </p>
    <p>This link works once and expires in 24 hours.</p>
  </body>
</html>
