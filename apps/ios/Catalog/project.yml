name: Catalog
options:
  bundleIdPrefix: app.fish
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  FishKit:
    path: ../FishKit
targets:
  Catalog:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: FishKit
        product: DesignSystem
      - package: FishKit
        product: UIComponents
      - package: FishKit
        product: ChatData
      - package: FishKit
        product: PersonalChat
      - package: FishKit
        product: CallData
      - package: FishKit
        product: Calls
      - package: FishKit
        product: CallMediaLiveKit
      - package: FishKit
        product: PresenceData
      - package: FishKit
        product: Presence
      - package: FishKit
        product: TestSupport
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        # Restricted debug key for live KLIPY search in the catalog. Inject
        # via `KLIPY_API_KEY=… xcodegen generate`; empty means fixtures.
        KlipyApiKey: ${KLIPY_API_KEY}
        # Calls: permission copy is calm and sentence case; requested only
        # from an explicit call or answer gesture.
        NSMicrophoneUsageDescription: FISH uses your microphone so you can talk during calls.
        NSCameraUsageDescription: FISH uses your camera so your coach can see you during video calls.
        # Keep an active call's audio alive when the app backgrounds.
        UIBackgroundModes: [audio]
        # Live call lab (dev-only, KLIPY pattern): inject the local stack via
        # `FISH_SUPABASE_URL=… FISH_SUPABASE_ANON_KEY=… FISH_SUPABASE_EMAIL=…
        # FISH_SUPABASE_PASSWORD=… FISH_SUPABASE_RECIPIENT_ID=… xcodegen
        # generate`. All empty means the lab page stays hidden.
        SupabaseUrl: ${FISH_SUPABASE_URL}
        SupabaseAnonKey: ${FISH_SUPABASE_ANON_KEY}
        SupabaseEmail: ${FISH_SUPABASE_EMAIL}
        SupabasePassword: ${FISH_SUPABASE_PASSWORD}
        SupabaseRecipientId: ${FISH_SUPABASE_RECIPIENT_ID}
        SupabaseRecipientName: ${FISH_SUPABASE_RECIPIENT_NAME}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.fish.catalog
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
  CatalogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: Catalog
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.fish.catalog-uitests
schemes:
  Catalog:
    build:
      targets:
        Catalog: all
        CatalogUITests: [test]
    test:
      targets:
        - CatalogUITests
