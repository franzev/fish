name: Catalog
options:
  bundleIdPrefix: app.fish
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  FishKit:
    path: ../FishKit
targets:
  Catalog:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: FishKit
        product: DesignSystem
      - package: FishKit
        product: UIComponents
      - package: FishKit
        product: ChatData
      - package: FishKit
        product: PersonalChat
      - package: FishKit
        product: TestSupport
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        # Restricted debug key for live KLIPY search in the catalog. Inject
        # via `KLIPY_API_KEY=… xcodegen generate`; empty means fixtures.
        KlipyApiKey: ${KLIPY_API_KEY}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.fish.catalog
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
  CatalogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: Catalog
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.fish.catalog-uitests
schemes:
  Catalog:
    build:
      targets:
        Catalog: all
        CatalogUITests: [test]
    test:
      targets:
        - CatalogUITests
