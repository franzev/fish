name: Fish
options:
  bundleIdPrefix: app.fish
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  FishKit:
    path: ../FishKit
targets:
  Fish:
    type: application
    platform: iOS
    sources:
      - Sources
      - ../ShareSupport
    resources: [Sources/PrivacyInfo.xcprivacy]
    dependencies:
      - target: FishShareExtension
        embed: true
      - package: FishKit
        product: DesignSystem
      - package: FishKit
        product: UIComponents
      - package: FishKit
        product: AccountSettings
      - package: FishKit
        product: CallData
      - package: FishKit
        product: Calls
      - package: FishKit
        product: CallMediaLiveKit
      - package: FishKit
        product: ChatData
      - package: FishKit
        product: PersonalChat
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: FISH
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: app.fish.mobile
            CFBundleURLSchemes: [fish]
        NSPhotoLibraryUsageDescription: FISH uses photos you choose to share in a conversation.
        NSPhotoLibraryAddUsageDescription: FISH can save photos you choose to your library.
        NSCameraUsageDescription: FISH uses your camera when you choose to take a photo for a conversation.
        NSMicrophoneUsageDescription: FISH uses your microphone when you hold the record button to send a voice message.
        UIBackgroundModes: [audio, voip]
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        KLIPY_API_KEY: $(KLIPY_API_KEY)
        KLIPY_CLIENT_KEY: $(KLIPY_CLIENT_KEY)
        WEB_BASE_URL: $(WEB_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.fish.mobile
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Sources/Fish.entitlements
        SUPABASE_URL: ${FISH_SUPABASE_URL}
        SUPABASE_ANON_KEY: ${FISH_SUPABASE_ANON_KEY}
        KLIPY_API_KEY: ${FISH_KLIPY_API_KEY}
        KLIPY_CLIENT_KEY: ${FISH_KLIPY_CLIENT_KEY}
        WEB_BASE_URL: ${FISH_WEB_BASE_URL}
        APS_ENVIRONMENT: development
        INFOPLIST_KEY_CFBundleDisplayName: FISH
      configs:
        Release:
          APS_ENVIRONMENT: production
  FishShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ../ShareExtension
      - ../ShareSupport
    entitlements:
      path: ../ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.fish.mobile
    info:
      path: ../ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: FISH
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsFileWithMaxCount: 5
              NSExtensionActivationSupportsImageWithMaxCount: 5
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURL: true
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.fish.mobile.share
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        APPLICATION_EXTENSION_API_ONLY: YES
      configs:
        Release:
          APS_ENVIRONMENT: production
  FishTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: Fish
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.fish.mobile-tests
schemes:
  Fish:
    build:
      targets:
        Fish: all
        FishShareExtension: all
        FishTests: [test]
    test:
      targets:
        - FishTests
